version: '3.8'

services:
  # 1. Redis: Yetkilendirme (Auth) için
  auth-db:
    image: redis:latest
    container_name: akilli-ev-redis
    networks:
      - iot-network

  # 2. MongoDB'ler (İzolasyon kuralı gereği ayrı ayrı)
  telemetry-db:
    image: mongo:latest
    container_name: akilli-ev-telemetry-mongo
    networks:
      - iot-network

  device-db:
    image: mongo:latest
    container_name: akilli-ev-device-mongo
    networks:
      - iot-network

  # 3. API Gateway (Dispatcher)
  gateway:
    build: .
    container_name: akilli-ev-gateway
    ports:
      - "3000:3000"
    depends_on:
      - auth-db
      - telemetry-service
      - device-service
    environment:
      - REDIS_URL=redis://auth-db:6379
    networks:
      - iot-network
    logging:
      driver: "json-file"
      options:
        tag: "{{.Name}}"

  # 4. Telemetry Mikroservisi
  telemetry-service:
    build: .
    command: npx ts-node src/services/telemetry.ts
    container_name: akilli-ev-telemetry-service
    environment:
      - MONGO_URL=mongodb://telemetry-db:27017/telemetry_db
    depends_on:
      - telemetry-db
    networks:
      - iot-network

  # 5. Device Control Mikroservisi
  device-service:
    build: .
    command: npx ts-node src/deviceControl/index.ts
    container_name: akilli-ev-device-service
    environment:
      - MONGO_URL=mongodb://device-db:27017/device_db
    depends_on:
      - device-db
    networks:
      - iot-network

  # --- İZLEME (GRAFANA/LOKI) ---
  promtail:
    image: grafana/promtail:latest
    container_name: akilli-ev-promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail-config.yaml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    networks:
      - iot-network

  loki:
    image: grafana/loki:latest
    container_name: akilli-ev-loki
    networks:
      - iot-network

  grafana:
    image: grafana/grafana:latest
    container_name: akilli-ev-grafana
    ports:
      - "4000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - iot-network

networks:
  iot-network:
    driver: bridge