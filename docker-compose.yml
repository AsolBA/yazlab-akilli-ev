version: '3.8'

services:
  # 1. Redis: Yetkilendirme (Auth) için
  auth-db:
    image: redis:latest
    container_name: akilli-ev-redis
    ports:
      - "6379:6379"
    networks:
      - iot-network

  # 2. MongoDB: Senin Telemetry (Sensör) verilerin için
  telemetry-db:
    image: mongo:latest
    container_name: akilli-ev-telemetry-mongo
    ports:
      - "27017:27017"
    networks:
      - iot-network

  # 3. Senin Uygulaman (Gateway + Telemetry Service)
  app:
    build: .
    container_name: akilli-ev-main-app
    ports:
      - "3000:3000"
    depends_on:
      - auth-db
      - telemetry-db
    environment:
      - REDIS_URL=redis://auth-db:6379
      - MONGO_URL=mongodb://telemetry-db:27017/telemetry_db
    networks:
      - iot-network

networks:
  iot-network:
    driver: bridge